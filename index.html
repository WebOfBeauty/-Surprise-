<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday UT 🎉</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(135deg,#ff9ecf,#ffc3e6,#d291ff);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI,sans-serif;
    overflow:hidden;
    padding:15px;
}

/* Glass Card */
.card-box{
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(20px);
    padding:25px;
    border-radius:25px;
    text-align:center;
    color:white;
    box-shadow:0 0 40px rgba(255,105,180,0.6);
    width:100%;
    max-width:420px;
}

/* Buttons */
.btn-main,.btn-love{
    width:100%;
    border-radius:30px;
    padding:12px;
    font-weight:bold;
    border:none;
    margin-top:10px;
}

.btn-main{
    background:#ff1493;
    color:white;
}
.btn-main:hover{background:#e60073;}

.btn-love{
    background:#ff4081;
    color:white;
}
.btn-love:hover{background:#e91e63;}

/* Cake */
.cake{
    position:relative;
    width:140px;
    height:160px;
    margin:20px auto;
    transform-style:preserve-3d;
    animation:rotateCake 8s infinite linear;
}

@keyframes rotateCake{
    from{transform:rotateY(0deg);}
    to{transform:rotateY(360deg);}
}

.layer{
    position:absolute;
    width:140px;
    height:40px;
    border-radius:12px;
    left:0;
}

.layer1{background:#ff69b4; top:100px;}
.layer2{background:#ff1493; top:65px;}
.layer3{background:#ff85c1; top:30px;}

.candle{
    position:absolute;
    width:10px;
    height:40px;
    background:white;
    top:0;
    left:65px;
    border-radius:5px;
}

.flame{
    width:15px;
    height:15px;
    background:radial-gradient(circle,yellow,orange,red);
    border-radius:50%;
    position:absolute;
    top:-15px;
    left:-2px;
    animation:flicker 0.3s infinite alternate;
}

@keyframes flicker{
    from{transform:scale(1);}
    to{transform:scale(1.3);}
}

.flame.off{display:none;}
.cake.stop{animation:none;}

/* Lyrics */
.lyric span{
    opacity:0.3;
    transition:0.5s;
    font-size:14px;
}

.active-line{
    opacity:1 !important;
    font-size:16px;
    font-weight:bold;
    text-shadow:0 0 8px #ff1493;
}

#birthdaySection{display:none;}

h2{
    font-size:20px;
}

</style>
</head>
<body>

<div class="card-box">

<div id="questionSection">
    <h2>🎉 Ready for a Surprise? 🎉</h2>
    <button class="btn btn-main" onclick="showBirthday()">Yes 🎂</button>
    <button class="btn btn-secondary w-100 mt-2" onclick="moveButton(this)">No 😜</button>
</div>

<div id="birthdaySection">

    <h2>🎉 Happy Birthday UT 💖 🎉</h2>

    <div class="cake" id="cake">
        <div class="layer layer1"></div>
        <div class="layer layer2"></div>
        <div class="layer layer3"></div>
        <div class="candle">
            <div class="flame" id="flame"></div>
        </div>
    </div>

    <div class="lyric mt-3">
        <p><span id="l1">Happy Birthday to you 🎵</span></p>
        <p><span id="l2">Happy Birthday to you 🎶</span></p>
        <p><span id="l3">Happy Birthday dear UT 💕</span></p>
        <p><span id="l4">Happy Birthday to you 🎂</span></p>
    </div>

    <button class="btn btn-love" onclick="startSong()">Start Celebration ✨</button>
    <button class="btn btn-main" onclick="cutCake()">🎂 Cut The Cake</button>

    <audio id="birthdayMusic">
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8d3f07a6f.mp3?filename=happy-birthday-112194.mp3" type="audio/mp3">
    </audio>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

function moveButton(btn){
    btn.style.position="absolute";
    btn.style.left=Math.random()*70+"%";
    btn.style.top=Math.random()*70+"%";
}

function showBirthday(){
    document.getElementById("questionSection").style.display="none";
    document.getElementById("birthdaySection").style.display="block";
}

function startSong(){
    let music=document.getElementById("birthdayMusic");
    music.play();

    let lines=["l1","l2","l3","l4"];
    lines.forEach((id,index)=>{
        setTimeout(()=>{
            document.getElementById(id).classList.add("active-line");
        },index*2000);
    });
}

function cutCake(){
    document.getElementById("cake").classList.add("stop");
    document.getElementById("flame").classList.add("off");

    confetti({
        particleCount:300,
        spread:120,
        origin:{y:0.6}
    });
}

</script>

</body>
</html>
